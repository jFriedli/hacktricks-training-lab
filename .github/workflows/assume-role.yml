name: Assume AWS Role via GitHub OIDC - sts-lab-2-target

on:
  workflow_dispatch

permissions:
  id-token: write
  contents: read

jobs:
  assume-and-read-flag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::152815104156:role/sts-lab-2-target
          role-session-name: github-oidc-lab
          audience: sts.amazonaws.com
          aws-region: us-east-1

      - name: Verify assumed identity
        run: aws sts get-caller-identity

      - name: List Secrets
        run: aws secretsmanager list-secrets --query 'SecretList[].Name' --output table

      - name: Read sts-lab-2 Flag
        run: |
          echo "=== Retrieving flag for sts-lab-2 ==="
          FLAG=$(aws secretsmanager get-secret-value \
            --secret-id flag_sts_lab_2 \
            --query 'SecretString' \
            --output text)
          echo "Flag: $FLAG"